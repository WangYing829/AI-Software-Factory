openapi: 3.0.3
info:
  title: DemoAlert API（模板演示）
  description: |
    AI-Software-Factory S02 模板深化示例。仓库示例代号可为 monitorV2；
    本契约描述虚构业务 DemoAlert，Fork 真实项目请整体替换。
  version: 0.2.1-demo
servers:
  - url: /api/v1
paths:
  /auth/login:
    post:
      summary: 登录
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string, format: password }
      responses:
        '200':
          description: 登录成功
        '401':
          description: 凭证无效或账号停用
  /alerts:
    get:
      summary: 告警分页列表
      tags: [alert]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: size
          schema: { type: integer, default: 20 }
        - in: query
          name: status
          schema: { type: string, enum: [open, acked, closed] }
        - in: query
          name: keyword
          schema: { type: string }
      responses:
        '200':
          description: OK
    post:
      summary: 手工创建告警
      tags: [alert]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, severity]
              properties:
                title: { type: string }
                severity: { type: string, enum: [P0, P1, P2] }
                remark: { type: string }
      responses:
        '201':
          description: 已创建
        '403':
          description: 无写权限
  /alerts/{id}:
    get:
      summary: 告警详情
      tags: [alert]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: OK
        '404':
          description: 不存在
  /alerts/{id}/ack:
    post:
      summary: 认领告警
      tags: [alert]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: 已认领
        '409':
          description: 已被他人认领
  /alerts/{id}/close:
    post:
      summary: 关闭告警
      tags: [alert]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [closeReason]
              properties:
                closeReason:
                  type: string
                  enum: [false_positive, fixed, handed_over, other]
                remark: { type: string }
      responses:
        '200':
          description: 已关闭
        '400':
          description: 参数校验失败
  /alerts/export:
    get:
      summary: 导出告警 CSV
      tags: [alert]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: keyword
          schema: { type: string }
      responses:
        '200':
          description: text/csv
          content:
            text/csv:
              schema: { type: string }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
